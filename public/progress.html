<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Progress — AfterHours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="progress">
    <header class="site-header">
      <a href="/" class="logo">
        <div class="logo-mark">AH</div>
        <div>
          <h1>AfterHours</h1>
          <p>grind after dark</p>
        </div>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="/" class="nav-link" data-nav="problems">Problems</a>
        <a href="/progress.html" class="nav-link" data-nav="progress">Progress</a>
        <a href="/about.html" class="nav-link" data-nav="about">About</a>
      </nav>
      <div class="header-actions">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div id="guestNav" class="nav-links">
          <a href="/login.html" class="btn btn-ghost">Log in</a>
          <a href="/signup.html" class="btn btn-primary">Sign up</a>
        </div>
        <div id="userNav" class="nav-links" hidden>
          <div class="user-chip">
            <span class="user-avatar" id="userAvatar" aria-hidden="true"></span>
            <span class="user-name" id="userName"></span>
          </div>
          <button id="logoutBtn" class="btn btn-ghost btn-sm" type="button">Log out</button>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="page-head">
        <h2>Your progress</h2>
        <p class="page-subtitle">Track streaks, patterns, and what to solve next</p>
      </div>
      <div id="reminderSettings" class="stats-card panel reminder-card" hidden>
        <h3>Daily reminder</h3>
        <p class="reminder-desc">Free browser notification — pick your time, solve one problem each day.</p>
        <label class="checkbox-label">
          <input type="checkbox" id="prefReminderEnabled" />
          Enable daily reminders
        </label>
        <div class="form-group" id="reminderTimeGroup">
          <label for="prefReminderTime">Reminder time</label>
          <input type="time" id="prefReminderTime" value="18:30" class="time-input" />
        </div>
        <p id="pushStatus" class="reminder-status"></p>
        <div class="reminder-actions">
          <button type="button" id="saveReminderBtn" class="btn btn-primary btn-sm">Save reminder</button>
          <button type="button" id="testReminderBtn" class="btn btn-ghost btn-sm" hidden>Send test now</button>
        </div>
      </div>

      <div id="progressDashboard">
        <div class="loading panel">
          <div class="loader"></div>
          loading your stats...
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>Built by Nishtha Singh · © 2026</p>
    </footer>

    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/push.js"></script>
    <script src="/js/unlocks.js"></script>
    <script src="/js/insights.js"></script>
    <script src="/js/progress-page.js"></script>
  </body>
</html>
