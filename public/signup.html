<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
    <title>💻 Sign up — AfterHours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <a href="/" class="logo" aria-label="AfterHours — Progress Never Clocks Out.">
        <div class="logo-mark" aria-hidden="true">
          <svg class="logo-laptop" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="8" y="6" width="32" height="22" rx="2.5" stroke="currentColor" stroke-width="1.75" />
            <rect x="10.5" y="8.5" width="27" height="17" rx="1.5" fill="#0d1117" />
            <text x="24" y="14.8" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="8" font-weight="700">After</text>
            <text x="24" y="22.5" text-anchor="middle" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="8" font-weight="700">Hours</text>
            <line x1="8" y1="28" x2="40" y2="28" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
            <path d="M5.5 28.5H42.5L45.5 35.5C45.5 36.3 44.8 37 44 37H4C3.2 37 2.5 36.3 2.5 35.5L5.5 28.5Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round" />
            <line x1="10" y1="30.5" x2="38" y2="30.5" stroke="currentColor" stroke-width="0.9" opacity="0.45" stroke-linecap="round" />
            <line x1="12" y1="33" x2="36" y2="33" stroke="currentColor" stroke-width="0.9" opacity="0.35" stroke-linecap="round" />
            <rect x="19" y="31.5" width="10" height="2.5" rx="1.25" stroke="currentColor" stroke-width="1" opacity="0.65" />
          </svg>
        </div>
        <p class="logo-tagline">
          <span class="logo-tagline-line">Progress Never</span>
          <span class="logo-tagline-line">Clocks Out.</span>
        </p>
      </a>
      <div class="header-actions">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="auth-container">
      <div class="auth-card panel">
        <h1>Create account</h1>
        <p class="auth-subtitle">One problem after work · 20 patterns · your pace</p>

        <form id="signupForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required placeholder="your name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="you@example.com" />
          </div>
          <div class="form-group form-group-checkbox">
            <label class="checkbox-label">
              <input type="checkbox" id="reminderEnabled" />
              Send me a daily email reminder to solve one problem
            </label>
          </div>
          <div class="form-group" id="reminderTimeGroup" hidden>
            <label for="reminderTime">Reminder time</label>
            <input type="time" id="reminderTime" value="18:30" />
            <p class="form-hint">We'll email you daily. Browser alerts are optional.</p>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" placeholder="min 6 chars" />
          </div>
          <p id="error" class="error-msg" hidden></p>
          <button type="submit" class="btn btn-primary btn-full">Create account</button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="/login">Log in</a>
        </p>
      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-credit">Built by Nishtha Singh · © 2026</p>
        <nav class="footer-social" aria-label="Social links"></nav>
      </div>
    </footer>

    <script src="/js/footer.js"></script>

    <script src="/js/auth.js"></script>
    <script src="/js/push.js"></script>
    <script>
      if (Auth.isLoggedIn()) window.location.href = "/";
      Push.bindSignupFlow();

      document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById("error");
        errorEl.hidden = true;

        const reminderEnabled = document.getElementById("reminderEnabled").checked;
        const { reminderHour, reminderMinute } = Push.parseTimeInput(
          document.getElementById("reminderTime").value,
        );

        try {
          const { data } = await Auth.api("/api/v1/auth/register", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("name").value,
              email: document.getElementById("email").value,
              password: document.getElementById("password").value,
              reminderEnabled,
              reminderHour,
              reminderMinute,
              timezone: Push.getTimezone(),
            }),
          });
          Auth.setSession(data);

          if (reminderEnabled) {
            await Push.setupAfterSignup({ reminderEnabled, reminderHour, reminderMinute });
          }

          window.location.href = "/?onboarding=1";
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
